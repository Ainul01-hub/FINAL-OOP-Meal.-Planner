<!DOCTYPE html>
<html>
<head>
    <title>Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1> ~ MealMate ~ </h1>
</div>

<div class="container">

    <div class="hero">
        <h2>Find Your Perfect Meal </h2>
        <p>Search delicious recipes and add them to your planner.</p>
        <input type="text" id="searchInput" placeholder="Search meal...">
        <button onclick="searchMeal()">Search</button>
    </div>

    <div id="mealResult" class="meal-grid"></div>

    <div id="mealDetails"></div>

    <div class="navigation">
        <button onclick="window.location.href='planner.html'">
    Go To My Planner
</button>

</div>

<script src="renderer.js"></script>
</body>
</html>
